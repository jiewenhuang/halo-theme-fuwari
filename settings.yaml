apiVersion: v1alpha1
kind: Setting
metadata:
  name: theme-fuwari-setting
spec:
  forms:
    - group: base
      label: 基础设置
      formSchema:
        - $formkit: group
          name: themeColor
          label: 主题颜色
          value:
            hue: 250
            fixed: false
          children:
            - $formkit: number
              name: hue
              min: 0
              max: 360
              step: 5
              label: 色调(Halo表单好像目前不支持 colorpicker)
              value: 250
              help: "主题颜色的默认色调，从0到360。红色：0，蓝绿色：200，青色：250，粉红色：345"
            - $formkit: switch
              name: fixed
              label: 固定色调
              value: false
              help: "隐藏访问者的主题彩色选择器"
        - $formkit: group
          name: banner
          label: Banner
          value:
            enable: true
            src: "/themes/theme-fuwari/assets/images/demo-banner.png"
            position: "center"
            credit:
              enable: false
              text: "© 2022 Fuwari"
              url: ""
          children:
            - $formkit: switch
              name: enable
              label: 启用
              value: true
              help: "启用横幅"
            - $formkit: attachment
              name: src
              label: 图片
              value: "/themes/theme-fuwari/assets/images/demo-banner.png"
              help: "显示的图像"
            - $formkit: select
              name: position
              label: 位置
              value: "center"
              options:
                - value: center
                  label: 居中
                - value: top
                  label: 顶部
                - value: bottom
                  label: 底部
            - $formkit: group
              name: credit
              label: 版权信息
              children:
                - $formkit: switch
                  name: enable
                  label: 启用
                  value: false
                  help: "启用版权信息"
                - $formkit: text
                  name: text
                  label: 文字
                  value: "© 2022 Fuwari"
                  help: "显示的文字"
                - $formkit: url
                  name: url
                  label: 链接
                  value:
        - $formkit: menuRadio
          id: menu
          name: menu
          label: 菜单
          value: ""
          help: "选择菜单(仅支持一级菜单)"
    - group: style
      label: 样式
      formSchema:
        - $formkit: select
          name: color_scheme
          label: 默认配色
          value: auto
          options:
            - label: 跟随系统
              value: auto
            - label: 深色
              value: dark
            - label: 浅色
              value: light

        - $formkit: switch
          name: enable_change_color_scheme
          label: 允许访客切换配色
          value: true
    - group: sidebar
      label: 侧边栏
      formSchema:
        - $formkit: array
          name: widgets
          label: 小部件
          value:
            - value: categories
            - value: tag
          children:
            - $formkit: select
              name: value
              id: widgets_value
              label: 部件
              options:
                - label: 热门文章（TODO）
                  value: popular-posts
                - label: 文章分类
                  value: categories
                - label: 文章标签
                  value: tag
                - label: 自定义HTML
                  value: html
            - $formkit: code
              if: $value.value === html
              name: html
              label: HTML
              value: "<p>自定义HTML</p>"
              language: html

    - group: profile
      label: 个人设置
      formSchema:
        - $formkit: switch
          name: enable_profile
          value: true
          label: 启用个人设置

        - $formkit: attachment
          name: avatar
          value: /themes/theme-fuwari/assets/images/demo-avatar.png
          label: 头像

        - $formkit: text
          name: name
          label: 昵称
          value: Fuwari

        - $formkit: text
          name: bio
          label: 简介
          value: "Lorem ipsum dolor sit amet, consectetur adipiscing elit."
        - $formkit: url
          name: url
          label: 链接(点击跳转登录和后台可使用 /login )
          value: /about

        - $formkit: array
          name: social_media
          label: 社交媒体

          children:
            - $formkit: iconify
              name: social_icon
              label: 社交图标
              format: svg # svg / dataurl / url / name
            - $formkit: text
              name: name
              label: 名称
            - $formkit: text
              name: url
              label: 链接
              validation: "required"

    - group: post
      label: 文章
      formSchema:
        - $formkit: group
          name: license
          label: 版权声明
          value:
            enable: false
            name: CC BY-NC-SA 4.0
            url: https://creativecommons.org/licenses/by-nc-sa/4.0/
          children:
            - $formkit: switch
              name: enable
              label: 启用
              value: false
              help: "启用版权声明"
            - $formkit: text
              name: name
              label: 名称
              value: CC BY-NC-SA 4.0
            - $formkit: url
              name: url
              label: 链接
              value: https://creativecommons.org/licenses/by-nc-sa/4.0/
        - $formkit: select
          name: content_size
          label: 字体大小
          value: prose-base
          options:
            - value: prose-base
              label: prose-base
            - value: prose-sm
              label: prose-sm
            - value: prose-lg
              label: prose-lg
            - value: prose-xl
              label: prose-xl
            - value: prose-2xl
              label: prose-2xl
        - $formkit: select
          name: content_theme
          label: 颜色主题
          value: prose-gray
          options:
            - value: prose-gray
              label: prose-gray
            - value: prose-slate
              label: prose-slate
            - value: prose-zinc
              label: prose-zinc
            - value: prose-neutral
              label: prose-neutral
            - value: prose-stone
              label: prose-stone
        - $formkit: switch
          name: enable_toc
          label: 启用目录
          value: true
          help: "启用目录"
        - $formkit: number
          name: toc_depth
          label: 目录最大深度
          value: 2
          help: "目录的最大深度"
    - group: beian
      label: 备案设置
      formSchema:
        - $formkit: text
          name: icp_text
          label: ICP备案号
        - $formkit: text
          name: icp_link
          label: ICP备案跳转链接
          value: https://beian.miit.gov.cn/

        - $formkit: text
          name: gongan_text
          label: 公安联网备案号
        - $formkit: text
          name: gongan_link
          label: 公安联网备案跳转链接
          value: https://beian.mps.gov.cn/#/query/webSearch
