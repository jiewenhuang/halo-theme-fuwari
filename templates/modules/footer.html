<div class="flex w-full flex-col items-center justify-center">
  <!--<div class="border-t border-[var(&#45;&#45;primary)] mx-16 border-dashed py-8 max-w-[var(&#45;&#45;page-width)] flex flex-col items-center justify-center px-6">-->
  <div class="my-10 w-2/3 border-t border-dashed border-black/10 transition dark:border-white/15"></div>
  <!--<div class="transition bg-[oklch(92%_0.01_var(&#45;&#45;hue))] dark:bg-black rounded-2xl py-8 mt-4 mb-8 flex flex-col items-center justify-center px-6">-->
  <div
    class="mb-12 flex flex-col items-center justify-center rounded-2xl border-dashed border-[oklch(85%_0.01_var(--hue))] px-6 transition dark:border-white/15"
  >
    <div class="text-50 text-center text-sm transition !delay-0">
      &copy;
      <span id="copyright-year" x-data="{ currentYear: new Date().getFullYear() }" x-text="currentYear"></span>
      [[${site.title}]]. All Rights Reserved. /
      <th:block th:if="${pluginFinder.available('PluginFeed')}">
        <a class="link font-medium text-[var(--primary)] transition" target="_blank" th:href="@{/rss.xml}">RSS</a> /
      </th:block>
      <a
        class="link font-medium text-[var(--primary)]"
        target="_blank"
        th:if="${pluginFinder.available('PluginSitemap')}"
        th:href="@{/sitemap.xml}"
        >Sitemap</a
      ><br />
      Powered by
      <a class="link font-medium text-[var(--primary)]" target="_blank" href="https://www.halo.run/">Halo</a> &
      <a
        class="link font-medium text-[var(--primary)]"
        target="_blank"
        href="https://github.com/jiewenhuang/halo-theme-fuwari"
        >Theme-Fuwari</a
      >
      <div
        class="mt-2 flex flex-wrap items-center justify-center gap-x-4 gap-y-1 text-xs text-black/50 transition dark:text-white/50"
        th:if="${not #strings.isEmpty(theme.config.beian.icp_text)} or ${not #strings.isEmpty(theme.config.beian.gongan_text)}"
      >
        <th:block th:if="${not #strings.isEmpty(theme.config.beian.icp_text)}">
          <a
            class="hover:underline"
            target="_blank"
            rel="noopener"
            th:href="${#strings.isEmpty(theme.config.beian.icp_link) ? 'https://beian.miit.gov.cn/' : theme.config.beian.icp_link}"
            th:text="|ICP备案号：${theme.config.beian.icp_text}|"
          >ICP备案号</a>
        </th:block>
        <th:block th:if="${not #strings.isEmpty(theme.config.beian.gongan_text)}">
          <a
            class="inline-flex items-center gap-1 hover:underline"
            target="_blank"
            rel="noopener"
            th:href="${#strings.isEmpty(theme.config.beian.gongan_link) ? 'https://beian.mps.gov.cn/#/query/webSearch' : theme.config.beian.gongan_link}"
          >
            <img
              th:src="@{/assets/images/gongan_beian.png}"
              alt="公安备案"
              class="size-4 opacity-80 transition dark:opacity-90"
              loading="lazy"
            />
            <span th:text="|公安备案：${theme.config.beian.gongan_text}|">公安备案</span>
          </a>
        </th:block>
      </div>
      <div
        th:if="${not #strings.isEmpty(theme.config.beian.div)}"
        th:utext="${theme.config.beian.div}"
        class="mt-2 flex items-center justify-center"
      ></div>
    </div>
  </div>
  <halo:footer />
</div>
